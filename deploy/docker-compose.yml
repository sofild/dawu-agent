# =============================================================================
# Dawu Agent - Local Development Stack
# =============================================================================

version: "3.8"

services:
  agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/dawu_agent
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ../workspace:/app/workspace
      - ../sessions:/app/sessions
      - ../memory:/app/memory
      - ../logs:/app/logs
    depends_on:
      - postgres
      - redis
      - jaeger
    networks:
      - dawu-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dawu_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dawu-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dawu-network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - dawu-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - dawu-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - dawu-network

volumes:
  postgres-data:
  chroma-data:
  prometheus-data:

networks:
  dawu-network:
    driver: bridge
